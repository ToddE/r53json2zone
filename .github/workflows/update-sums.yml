name: Update SHA256SUMS

on:
  push:
    branches:
      - main
    paths:
      - r53json2zone

permissions:
  contents: write

jobs:
  update-sums:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute and update SHA256SUMS
        run: |
          HASH=$(sha256sum r53json2zone | awk '{print $1}')
          DATE=$(date +%Y-%m-%d)
          echo "$HASH $DATE r53json2zone" > SHA256SUMS

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SHA256SUMS
          git commit -m "chore: update SHA256SUMS" || echo "No changes to commit"

      - name: Push changes
        run: git push
